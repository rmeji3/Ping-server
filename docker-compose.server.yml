services:
  ping-server:
    image: ${PING_IMAGE}
    container_name: ping-server
    restart: always
    # Bind to localhost only. nginx (on the host) proxies https://:443 -> 127.0.0.1:8080.
    # Nothing on the public interface; the inbound 8080 security-group rule can be removed.
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env.server
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    depends_on:
      - redis
    # Persist the DataProtection keyring across redeploys so session cookies,
    # antiforgery tokens, and IDataProtector payloads survive container recreation.
    volumes:
      - dataprotection-keys:/root/.aspnet/DataProtection-Keys
    mem_limit: 512m

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    # Localhost-only + password. Never expose Redis on a public interface.
    # REDIS_PASSWORD must match the password embedded in REDIS_CONNECTION (.env.server).
    ports:
      - "127.0.0.1:6379:6379"
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --maxmemory
      - 100mb
      - --maxmemory-policy
      - allkeys-lru
    mem_limit: 128m

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    volumes:
      - ./prometheus.prod.yml:/etc/prometheus/prometheus.yml
    # Localhost-only. Reach it via an SSH tunnel, not a public port.
    ports:
      - "127.0.0.1:9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    mem_limit: 160m

  # Grafana is intentionally NOT run on the prod box — on ~1GB it OOMs alongside
  # app + redis + prometheus. Run it on your laptop instead, pointed at Prometheus
  # over an SSM port-forward tunnel (localhost:9090 -> 127.0.0.1:9090 on the box).

volumes:
  dataprotection-keys:
