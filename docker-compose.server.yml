version: '3.8'

services:
  ping-server:
    image: ${PING_IMAGE}
    container_name: ping-server
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env.server
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
